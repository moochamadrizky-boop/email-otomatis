<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Massal</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Email Massall BY Jangkung</h1>

      <!-- TAMBAHAN SUBJECT -->
      <p>Subjek Email (untuk semua)</p>
      <input
        type="text"
        id="subjectEmail"
        placeholder="Contoh: Promo Spesial Hari Ini"
      />

      <!-- TEMPLATE PESAN -->
      <p>Template Pesan Khusus (pakai {nama} untuk isi otomatis)</p>
      <textarea
        id="templatePesan"
        placeholder="Halo {nama}, ini pesan untuk kamu"
      ></textarea>

      <!-- FORMAT INPUT -->
      <p>
        Format input: <code>Nama,Email,Catatan(optional)</code> (1 baris = 1
        data)
      </p>

      <!-- Textarea Input -->
      <textarea
        id="dataInput"
        placeholder="Rizky,rizky@gmail.com,VIP"
      ></textarea>

      <!-- Buttons -->
      <div class="buttons">
        <button id="sendBtn">🚀 Kirim ke Sheet</button>
        <button id="sendEmailBtn">📤 Jalankan Email</button>
        <button id="hapusBtn">🗑 Hapus Data</button>
      </div>

      <!-- Status Global -->
      <p id="status" class="status"></p>

      <p id="summary" class="status">Total: 0 | Berhasil: 0 | Gagal: 0</p>

      <!-- Tabel Status -->
      <h3>Status Email</h3>

      <table id="statusTable">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Email</th>
            <th>Pesan Khusus</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody></tbody>
      </table>
    </div>

    <!-- Script JS -->
    <script src="script.js"></script>
  </body>
</html>
